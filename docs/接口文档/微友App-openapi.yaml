          type: integer
          format: int64
        nickname:
          type: string
        avatar:
          type: string
        applyMessage:
          type: string
        status:
          type: integer
          format: int32
        createdAt:
          type: string
    HandleFriendRequest:
      type: object
      required:
        - requestId
        - action
      properties:
        requestId:
          type: integer
          format: int64
