components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiResponseBase:
      type: object
      required:
        - code
        - message
        - traceId
      properties:
        code:
          type: integer
          format: int32
          example: 0
        message:
          type: string
          example: ok
        traceId:
          type: string
          example: 3f4b9d6e8a2c4f1b
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              nullable: true
    PageDataBase:
      type: object
      required:
        - pageNo
        - pageSize
        - total
        - hasMore
      properties:
        pageNo:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        total:
          type: integer
          format: int64
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true
    FlexibleMap:
      type: object
      additionalProperties: true
    ApiResponseVoid:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              nullable: true
    LoginPasswordRequest:
      type: object
      required:
        - mobile
        - password
        - deviceId
      properties:
        mobile:
          type: string
        password:
          type: string
        deviceId:
          type: string
    LoginSmsRequest:
      type: object
      required:
        - mobile
        - smsCode
        - deviceId
      properties:
        mobile:
          type: string
        smsCode:
          type: string
        deviceId:
          type: string
    RegisterRequest:
      type: object
      required:
        - mobile
        - smsCode
        - password
      properties:
        mobile:
          type: string
        smsCode:
          type: string
        password:
          type: string
        deviceId:
          type: string
          nullable: true
    SmsSendRequest:
      type: object
      required:
        - mobile
        - scene
      properties:
        mobile:
          type: string
        scene:
          type: string
    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    DeviceActionRequest:
      type: object
      required:
        - deviceId
      properties:
        deviceId:
          type: string
    LoginTokenData:
      type: object
      required:
        - userId
        - accessToken
        - refreshToken
        - expireIn
        - needDeviceVerify
      properties:
        userId:
          type: integer
          format: int64
        accessToken:
          type: string
        refreshToken:
          type: string
        expireIn:
          type: integer
          format: int32
        needDeviceVerify:
          type: boolean
    DeviceSession:
      type: object
      properties:
        deviceId:
          type: string
        deviceType:
          type: string
        deviceModel:
          type: string
        systemVersion:
          type: string
        loginCity:
          type: string
        loginIp:
          type: string
        lastLoginAt:
          type: string
        online:
          type: boolean
    UserProfileData:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        weiyouNo:
          type: string
        nickname:
          type: string
        avatar:
          type: string
        gender:
          type: integer
          format: int32
        city:
          type: string
        signature:
          type: string
        statusText:
          type: string
        qrcodeUrl:
          type: string
    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
        avatar:
          type: string
        gender:
          type: integer
          format: int32
        city:
          type: string
        signature:
          type: string
    QrcodeData:
      type: object
      properties:
        ticket:
          type: string
        qrcodeUrl:
          type: string
        dynamic:
          type: boolean
        expireAt:
          type: string
    UpdateStatusRequest:
      type: object
      required:
        - statusCode
      properties:
        statusCode:
          type: string
        statusText:
          type: string
        expireAt:
          type: string
    UpdateUserSettingRequest:
      type: object
      properties:
        messageNotification:
          type: boolean
        momentNotification:
          type: boolean
        officialNotification:
          type: boolean
        soundEnabled:
          type: boolean
        vibrationEnabled:
          type: boolean
        addByPhone:
          type: boolean
        addByWeiyouNo:
          type: boolean
        groupInviteConfirm:
          type: boolean
        hideMyMoments:
          type: boolean
        hideLocation:
          type: boolean
    UserSettingData:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        messageNotification:
          type: boolean
        momentNotification:
          type: boolean
        officialNotification:
          type: boolean
        soundEnabled:
          type: boolean
        vibrationEnabled:
          type: boolean
        addByPhone:
          type: boolean
        addByWeiyouNo:
          type: boolean
        groupInviteConfirm:
          type: boolean
        hideMyMoments:
          type: boolean
        hideLocation:
          type: boolean
    ContactItem:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        remark:
          type: string
        avatar:
          type: string
        letter:
          type: string
        star:
          type: boolean
    FriendApplyRequest:
      type: object
      required:
        - targetUserId
      properties:
        targetUserId:
          type: integer
          format: int64
        remark:
          type: string
        source:
          type: string
    FriendRequestItem:
      type: object
      properties:
        requestId:
          type: integer
          format: int64
