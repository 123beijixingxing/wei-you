openapi: 3.0.3
info:
  title: 微友 App Backend API Draft
  version: 0.1.0-draft
  description: |
    基于当前后端控制器、需求文档与已生成接口文档整理的 OpenAPI 3.0 草稿。
    
    说明：
    - HTTP Base URL: `http://localhost:8080/api`
    - WebSocket URL: `ws://localhost:8081/ws/chat`
    - WebSocket 协议详情见 `docs/接口文档/微友App-后端接口文档.md`
    - 当前部分接口仍为 demo/stub/no-op 实现，字段结构可用于联调，业务结果未必代表最终生产行为
servers:
  - url: http://localhost:8080/api
    description: Local development server
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: 认证与账号
  - name: User
    description: 用户资料
  - name: UserSetting
    description: 用户设置
  - name: Contact
    description: 通讯录与好友
  - name: Chat
    description: 会话与消息
  - name: Group
    description: 群聊
  - name: Collection
    description: 收藏
  - name: Card
    description: 卡包
  - name: Emoji
    description: 表情商店
  - name: Moment
    description: 朋友圈
  - name: Wallet
    description: 钱包与支付
  - name: Feature
    description: 发现与功能中心
  - name: Scan
    description: 扫一扫
  - name: App
    description: App 启动配置
  - name: Media
    description: 媒体上传
  - name: Search
    description: 搜索
  - name: Notice
    description: 通知
  - name: Official
    description: 公众号
  - name: MiniApp
    description: 小程序
  - name: Feedback
    description: 反馈
x-weiyou-websocket:
  url: ws://localhost:8081/ws/chat
  description: IM 实时消息 WebSocket 通道
  auth:
    query:
      - token
      - deviceId
  docs:
    - docs/接口文档/微友App-后端接口文档.md
    - docs/接口文档/微友App-前端联调字段说明.md
paths:
  /auth/login/password:
    post:
      tags:
        - Auth
      summary: 密码登录
      description: 匿名接口，标准密码登录。
      security: []
      operationId: authLoginPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLoginTokenData'
  /auth/login/sms:
    post:
      tags:
        - Auth
      summary: 短信验证码登录
      description: 匿名接口。当前 smsCode 未真正校验，手机号不存在时会自动注册。
      security: []
      operationId: authLoginSms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginSmsRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLoginTokenData'
  /auth/register:
    post:
      tags:
        - Auth
      summary: 注册
      description: 匿名接口。当前 smsCode 未真正校验；若手机号已存在则直接返回原账号登录态。
      security: []
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLoginTokenData'
  /auth/sms/send:
    post:
      tags:
        - Auth
      summary: 发送短信验证码
      description: 匿名接口。当前为 no-op 占位实现。
      security: []
      operationId: authSendSms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsSendRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /auth/token/refresh:
    post:
      tags:
        - Auth
      summary: 刷新 token
      description: 匿名接口。仅接受 refresh token。
      security: []
      operationId: authRefreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseLoginTokenData'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: 退出登录
      description: 按 deviceId 将目标设备下线。
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseVoid'
  /auth/device/list:
    get:
      tags:
        - Auth
      summary: 查询登录设备列表
      description: 优先查库，若无设备数据则返回 demo 数据。
      operationId: authDeviceList
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseDeviceSessionList'
  /auth/device/offline:
    post:
      tags:
        - Auth
      summary: 下线指定设备
      description: 当前未校验设备归属。
      operationId: authDeviceOffline
