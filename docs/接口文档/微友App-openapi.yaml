          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseQrcodeData'
  /user/status/update:
    post:
      tags:
        - User
      summary: 更新状态
      description: expireAt 当前未实际落库。
      operationId: userStatusUpdate
      requestBody:
